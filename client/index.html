<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodMate - Lær om følelsene dine</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="style.css">
    <!-- Local flag images (small, inline SVG files under assets/flags) -->
    <!-- Favicons: prefer SVG, fallback to the included PNG -->
    <link rel="icon" href="assets/icons/MoodMate_Favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/icons/Favicon_Smileys.png" type="image/png">
</head>
<body>
    <!-- Language switcher (flags) -->
    <div class="lang-switcher" role="navigation" aria-label="Språk">
        <button class="lang-btn" data-lang="nb" title="Norsk" aria-label="Norsk">
            <img src="assets/flags/no.svg" alt="Norsk flagg" width="28" height="21" aria-hidden="false">
        </button>
        <button class="lang-btn" data-lang="en" title="English" aria-label="English">
            <img src="assets/flags/gb.svg" alt="United Kingdom flag" width="28" height="14" aria-hidden="false">
        </button>
        <button class="lang-btn" data-lang="sv" title="Svenska" aria-label="Svenska">
            <img src="assets/flags/se.svg" alt="Svenskt flagg" width="28" height="18" aria-hidden="false">
        </button>
    </div>

    <!-- Skip link for keyboard users -->
    <a class="skip-link" href="#app-root">Hopp til innhold</a>
    <main id="app-root" role="main">
    </main>

    <div id="legal-modal" class="modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-content">
            <span class="close-modal" id="close-x" aria-label="Lukk">&times;</span>
            <h2 id="modal-title">Vilkår og personvern</h2>
            <div id="legal-text"></div>
            <button id="close-modal-btn" class="secondary-btn">Lukk</button>
        </div>
    </div>

    <!-- Global notice area for inline messages (aria-live for screen readers). Text shown here should be Norwegian. -->
    <div id="global-notice" class="notice hidden" role="status" aria-live="polite"></div>

    <script type="module">
        // Auto-set API base for local development when served from localhost.
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
            // Point to the Express server origin (no '/api' suffix) used by the /server app
            window.__API_BASE__ = `${location.protocol}//${location.hostname}:3000`;
        }

        // Defensive: suppress noisy unhandled promise rejections generated by injected extensions/preview scripts
        // when they indicate an asynchronous response by returning true but never reply. This is not an app bug;
        // it's caused by external tooling (browser extension / IDE preview). We only suppress the specific message
        // to avoid masking other real errors.
        window.addEventListener('unhandledrejection', (event) => {
            try {
                const reason = event.reason;
                const msg = reason && reason.message ? String(reason.message) : String(reason);
                if (typeof msg === 'string' && msg.includes('A listener indicated an asynchronous response')) {
                    // Prevent the default logging of this unhelpful extension/unhandledrejection error
                    event.preventDefault();
                    // Keep a quiet debug log so developers can still see the occurrence in devtools if needed
                    console.debug('Suppressed noisy extension/unhandledrejection:', msg);
                }
            } catch (e) {
                // If our suppression logic fails, don't interfere with normal error handling
                console.error('Error in unhandledrejection suppression handler', e);
            }
        });
    </script>

    <!-- Load the SPA bootstrap module with a cache-busting query during development so changes are always fetched -->
    <script>
        (function() {
            try {
                const script = document.createElement('script');
                script.type = 'module';
                // Append a timestamp to avoid stale module caching in development
                script.src = `app.mjs?cb=${Date.now()}`;
                document.head.appendChild(script);
            } catch (e) {
                console.error('Could not load app module:', e);
            }
        })();
    </script>
</body>
</html>
