<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title"></title>
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icons/MoodMate_Favicon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/icons/Favicon_Smileys.png" type="image/png">
</head>
<body>
<div id="lang-switcher" class="lang-switcher" role="navigation" data-i18n-attr="aria-label" data-i18n="lang.switcher.ariaLabel">
</div>

<button id="global-logout" class="link-btn hidden" data-i18n-attr="aria-label" title="Log out">
    <svg class="logout-icon" aria-hidden="true" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 13v-2H7V8l-5 4 5 4v-3zM20 3h-8v2h8v14h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" fill="currentColor"/>
    </svg>
    <span class="logout-label"></span>
</button>

<main id="app-root" role="main">
</main>

<div id="legal-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-content">
        <span class="close-modal" id="close-x" data-i18n-attr="aria-label" data-i18n="legal.close">&times;</span>
        <h2 id="modal-title" data-i18n="legal.modalTitle"></h2>
        <div id="legal-text"></div>
        <button id="close-modal-btn" class="secondary-btn" data-i18n="legal.close"></button>
    </div>
</div>

<div id="global-notice" class="notice hidden" role="status" aria-live="polite"></div>

<script type="module" src="modules/bootstrap.mjs"></script>
<script type="module" src="app.mjs"></script>
</body>
</html>
