<!DOCTYPE html>
<html lang="no">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MoodMate - Lær om følelsene dine</title>
        <link rel="manifest" href="./manifest.json">
        <link rel="stylesheet" href="style.css">
        <!-- Local flag images (small, inline SVG files under assets/flags) -->
        <!-- Favicons: prefer SVG, fallback to the included PNG -->
        <link rel="icon" href="assets/icons/MoodMate_Favicon.svg" type="image/svg+xml">
        <link rel="icon" href="assets/icons/Favicon_Smileys.png" type="image/png">
    </head>
    <body>
        <!-- Language switcher (flags) -->
        <div id="lang-switcher" class="lang-switcher" role="navigation" aria-label="Språk">
            <!-- Buttons injected by app.mjs from assets/flags/flags.json -->
        </div>

        <main id="app-root" role="main">
        </main>

        <div id="legal-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-content">
            <span class="close-modal" id="close-x" aria-label="Lukk">&times;</span>
            <h2 id="modal-title">Vilkår og personvern</h2>
            <div id="legal-text"></div>
            <button id="close-modal-btn" class="secondary-btn">Lukk</button>
        </div>
        </div>

        <!-- Global notice area for inline messages (aria-live for screen readers). Text shown here should be Norwegian. -->
        <div id="global-notice" class="notice hidden" role="status" aria-live="polite"></div>

        <!-- External module scripts: bootstrap helpers and the SPA entry module -->
        <script type="module" src="modules/bootstrap.mjs"></script>
        <script type="module" src="app.mjs"></script>
    </body>
</html>
