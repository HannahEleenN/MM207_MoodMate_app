<section id="child-login-container">
  <div class="brand">
    <h1 data-i18n="app.title"></h1>
    <p data-i18n="child.loginPrompt">Logg inn med hemmelig kode</p>
  </div>

  <form id="childLoginForm">
    <div class="input-group">
      <label for="child-pin-input" data-i18n="child.pinLabel">Hemmelig kode</label>
      <input type="password" id="child-pin-input" required placeholder="****" maxlength="6">
    </div>
    <button type="submit" class="primary-btn" data-i18n="child.continue">Fortsett</button>
  </form>

  <div class="login-footer">
    <p><button id="back-to-parent" class="link-btn" data-i18n="child.backToParent">Tilbake til foreldrekontroll</button></p>
  </div>
</section>
