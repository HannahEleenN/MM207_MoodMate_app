<section id="child-login-container">
  <div class="brand">
    <h1>MoodMate - Barn</h1>
    <p>Logg inn med hemmelig kode</p>
  </div>

  <form id="childLoginForm">
    <div class="input-group">
      <label for="child-pin-input">Hemmelig kode</label>
      <input type="password" id="child-pin-input" required placeholder="****" maxlength="6">
    </div>
    <button type="submit" class="primary-btn">Fortsett</button>
  </form>

  <div class="login-footer">
    <p><button id="back-to-parent" class="link-btn">Tilbake til foreldrekontroll</button></p>
  </div>
</section>
