<section class="user-manager">
    <div class="user-manager-header">
        <h2 data-i18n="userManager.title">User Management</h2>
    </div>

    <div class="registration-card">
        <form id="regForm" class="registration-form">
            <div class="form-section">
                <h3 data-i18n="userManager.createTitle">Register Parent Account</h3>
            </div>

            <div class="input-group">
                <label for="reg-nick" data-i18n="userManager.nicknameLabel">Nickname</label>
                <input type="text" id="reg-nick" name="nick"
                       data-i18n-placeholder="register.nickPlaceholder"
                       placeholder="e.g. MamaBear" required>
                <span class="helper-text" data-i18n="register.nickHelper">This is your display name</span>
            </div>

            <div class="input-group">
                <label for="reg-email" data-i18n="userManager.emailLabel">Email Address</label>
                <input type="email" id="reg-email" name="email"
                       data-i18n-placeholder="login.emailPlaceholder"
                       placeholder="yourname@email.com" required>
            </div>

            <div class="input-group">
                <label for="reg-password" data-i18n="login.passwordLabel">Password</label>
                <input type="password" id="reg-password" name="secret"
                       data-i18n-placeholder="login.passwordPlaceholder"
                       placeholder="Enter a secure password" required>
            </div>

            <div class="form-section">
                <h4 class="section-title">📋 Privacy Policy & Terms of Service</h4>

                <div class="legal-links-section">
                    <p class="legal-intro" data-i18n="register.legalIntro"></p>
                    <div class="legal-links">
                        <a href="#" id="view-tos" data-i18n="legal.terms"></a>
                        <span class="separator">•</span>
                        <a href="#" id="view-privacy" data-i18n="legal.privacy"></a>
                    </div>
                </div>

                <label class="consent-label">
                    <input type="checkbox" name="hasConsented" id="consent-check" required>
                    <span data-i18n="register.consentCheckbox">I agree to Terms and Privacy Policy</span>
                </label>
            </div>

            <button type="submit" class="primary-btn" data-i18n="register.submit">Create Account</button>
        </form>
    </div>

    <div class="existing-users-section">
        <h3 data-i18n="userManager.existingTitle">Registered Users</h3>
        <ul id="user-list"></ul>
    </div>

    <template id="user-item-template">
        <li>
            <span class="user-email-display"></span>
            <div class="user-actions">
                <button class="btn-edit" data-i18n="profiles.edit"></button>
                <button class="btn-del" data-i18n="profiles.delete"></button>
            </div>
        </li>
    </template>

    <template id="user-edit-template">
        <div class="edit-inline">
            <input type="text" class="edit-input" aria-label="Edit user">
            <button class="save-edit" data-i18n="profiles.save" aria-label="Save"></button>
            <button class="cancel-edit" data-i18n="profiles.cancel" aria-label="Cancel"></button>
        </div>
    </template>
</section>
