<section class="user-manager">
    <h2 data-i18n="userManager.title"></h2>

    <form id="regForm">
        <h3 data-i18n="userManager.createTitle"></h3>
        <div class="input-group">
            <label for="reg-nick" data-i18n="register.nickLabel"></label>
            <span class="helper-text" data-i18n="register.nickHelper"></span>
            <input type="text" id="reg-nick" name="nick" placeholder="" aria-label="Nickname" data-i18n-placeholder="register.nickPlaceholder">
        </div>
        <div class="input-group">
            <label for="reg-email" data-i18n="login.emailLabel"></label>
            <input type="email" id="reg-email" name="email" placeholder="" aria-label="Email" required data-i18n-placeholder="login.emailPlaceholder">
        </div>
        <div class="input-group">
            <label for="reg-password" data-i18n="login.passwordLabel"></label>
            <input type="password" id="reg-password" name="secret" placeholder="" aria-label="Password" required data-i18n-placeholder="login.passwordPlaceholder">
        </div>
        <div class="legal-links-section">
            <p class="legal-intro" data-i18n="register.legalIntro"></p>
            <div class="legal-links">
                <a href="#" id="view-tos" data-i18n="legal.terms"></a>
                <span class="separator">•</span>
                <a href="#" id="view-privacy" data-i18n="legal.privacy"></a>
            </div>
        </div>
        <label class="consent-label">
            <input type="checkbox" name="hasConsented" id="consent-check" value="true" required>
            <span data-i18n="register.consentCheckbox"></span>
        </label>
        <button type="submit" class="btn-reg" data-i18n="register.submit"></button>
    </form>

    <button id="go-to-login" class="link-btn" data-i18n="userManager.goToLogin"></button>

    <hr>

    <h3 data-i18n="userManager.existingTitle"></h3>
    <ul id="user-list"></ul>

    <template id="user-item-template">
        <li>
            <span class="user-email-display"></span>
            <div class="user-actions">
                <button class="btn-edit" data-i18n="profiles.edit"></button>
                <button class="btn-del" data-i18n="profiles.delete"></button>
            </div>
        </li>
    </template>

    <template id="user-edit-template">
        <div class="edit-inline">
            <input type="text" class="edit-input" aria-label="Edit user">
            <button class="save-edit" data-i18n="profiles.save"></button>
            <button class="cancel-edit" data-i18n="profiles.cancel"></button>
        </div>
    </template>
</section>
