<main id="mood-checkin-flow" aria-label="Mood check-in wizard">
    <div class="progress-container">
        <progress id="checkin-progress" value="33" max="100" aria-label="Progress through mood check-in"></progress>
    </div>

    <div id="step-1" class="step-container" role="region" aria-label="Step 1: Select mood">
        <h2 data-i18n="child.hello"></h2>
        <p data-i18n="child.askMood"></p>
        <div class="mood-grid" role="radiogroup" aria-label="Mood selection">
            <button type="button" class="mood-btn" data-mood="happy" data-i18n="mood.happy" aria-label="Happy"></button>
            <button type="button" class="mood-btn" data-mood="sad" data-i18n="mood.sad" aria-label="Sad"></button>
            <button type="button" class="mood-btn" data-mood="angry" data-i18n="mood.angry" aria-label="Angry"></button>
            <button type="button" class="mood-btn" data-mood="scared" data-i18n="mood.scared" aria-label="Scared"></button>
            <button type="button" class="mood-btn" data-mood="calm" data-i18n="mood.calm" aria-label="Calm"></button>
            <button type="button" class="mood-btn" data-mood="surprised" data-i18n="mood.surprised" aria-label="Surprised"></button>
        </div>
    </div>

    <div id="step-2" class="step-container" role="region" aria-label="Step 2: Explain mood" hidden aria-hidden="true">
        <h2><span data-i18n="checkin.reasonTitle"></span> <span id="selected-mood-text"></span>?</h2>

        <fieldset class="form-fieldset">
          <legend class="sr-only" data-i18n="checkin.contextLabel"></legend>

          <div id="form-status-step2" class="sr-only" aria-live="polite" aria-atomic="true"></div>

          <div class="reasons-section">
            <label class="section-label" id="reasons-label">
              <span data-i18n="checkin.instructions"></span>
            </label>
            <div id="reasons-text" class="reasons-container" aria-labelledby="reasons-label"></div>
          </div>

          <div class="input-group">
            <label for="mood-context-text" class="section-label" data-i18n="checkin.contextLabel"></label>
            <textarea id="mood-context-text" aria-labelledby="mood-context-text" aria-describedby="context-helper" data-i18n-placeholder="checkin.contextPlaceholder" placeholder=""></textarea>
            <span id="context-helper" class="helper-text" data-i18n="checkin.contextHelper"></span>
          </div>
        </fieldset>

        <div class="button-group">
            <button type="button" id="btn-prev-step-2" class="secondary-btn" data-i18n="checkin.previous" aria-label="Previous">Previous</button>
            <button type="button" id="btn-next-step" class="primary-btn" data-i18n="checkin.next" aria-label="Next">Next</button>
        </div>
    </div>

    <div id="step-3" class="step-container" role="region" aria-label="Step 3: Choose action" hidden aria-hidden="true">
        <h2 data-i18n="child.nextActionTitle"></h2>
        <div class="mood-grid" id="step-3-solutions" role="group" aria-label="Suggested actions"></div>

        <fieldset class="form-fieldset">
          <legend class="sr-only" data-i18n="checkin.contextLabel"></legend>

          <div class="input-group">
            <label for="solution-context-text" class="section-label" data-i18n="checkin.contextLabel"></label>
            <textarea id="solution-context-text" aria-labelledby="solution-context-text" aria-describedby="solution-helper" data-i18n-placeholder="checkin.contextPlaceholder" placeholder=""></textarea>
            <span id="solution-helper" class="helper-text" data-i18n="checkin.contextHelper"></span>
          </div>
        </fieldset>

        <div class="button-group">
            <button type="button" id="btn-prev-step-3" class="secondary-btn" data-i18n="checkin.previous" aria-label="Previous">Previous</button>
            <button type="button" id="btn-finish" class="primary-btn" data-i18n="checkin.finish" aria-label="Finish">Finish</button>
        </div>
    </div>
</main>
