<section id="login-container">
  <div class="brand">
    <h1 data-i18n="app.title">MoodMate</h1>
    <h3 data-i18n="app.tagline">Forstå dine følelser 🌟</h3>
  </div>

  <form id="loginForm">
    <h2 data-i18n="login.title">Logg inn</h2>
    <div class="input-group">
      <label for="email-input" data-i18n="login.emailLabel">E-post</label>
      <input type="email" id="email-input" required data-i18n-placeholder="login.emailPlaceholder" placeholder="forelder@eksempel.no">
    </div>
    <div class="input-group">
      <label for="password-input" data-i18n="login.passwordLabel">Passord</label>
      <input type="password" id="password-input" required data-i18n-placeholder="login.passwordPlaceholder" placeholder="Skriv inn passordet ditt">
    </div>

    <button type="submit" class="primary-btn" data-i18n="login.submit">Logg inn</button>
  </form>

  <div class="login-footer">
    <p data-i18n="login.legalPrefix">Ved å logge inn godtar du våre
      <a href="#" id="view-tos" data-i18n="legal.terms">Vilkår</a>
      <a href="#" id="view-privacy" data-i18n="legal.privacy">Personvern</a>
    </p>
  </div>

  <div class="login-footer">
    <p><span data-i18n="login.newUser">Ny bruker?</span> <button id="go-to-reg" class="link-btn" data-i18n="login.createAccount">Opprett en foreldrekonto</button></p>
  </div>
</section>
