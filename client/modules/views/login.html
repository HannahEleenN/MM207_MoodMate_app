<section id="login-container">
  <div class="brand">
    <h1 data-i18n="app.title"></h1>
    <h2 data-i18n="app.tagline"></h2>
  </div>

  <form id="loginForm">
    <h2 data-i18n="login.title"></h2>
    <div class="input-group">
      <label for="email-input" data-i18n="login.emailLabel"></label>
      <input type="email" id="email-input" required data-i18n-placeholder="login.emailPlaceholder" placeholder="">
    </div>
    <div class="input-group">
      <label for="password-input" data-i18n="login.passwordLabel"></label>
      <input type="password" id="password-input" required data-i18n-placeholder="login.passwordPlaceholder" placeholder="">
    </div>

    <button type="submit" class="primary-btn" data-i18n="login.submit"></button>
  </form>

  <div class="login-footer">
    <p data-i18n="login.legalPrefix">
      <a href="#" id="view-tos" data-i18n="legal.terms"></a>
      <a href="#" id="view-privacy" data-i18n="legal.privacy"></a>
    </p>
  </div>

  <div class="login-footer">
    <p><span data-i18n="login.newUser"></span> <button id="go-to-reg" class="link-btn" data-i18n="login.createAccount"></button></p>
  </div>
</section>
