<section id="login-container">
  <div class="brand">
    <h1>MoodMate</h1>
    <h3>Forstå dine følelser 🌟</h3>
  </div>

  <form id="loginForm">
    <h2>Logg inn</h2>
    <div class="input-group">
      <label for="email-input">E-post</label>
      <input type="email" id="email-input" required placeholder="forelder@eksempel.no">
    </div>
    <div class="input-group">
      <label for="password-input">Passord</label>
      <input type="password" id="password-input" required placeholder="Skriv inn passordet ditt">
    </div>

    <button type="submit" class="primary-btn">Logg inn</button>
  </form>

  <div class="login-footer">
    <p>Ved å logge inn godtar du våre
      <a href="#" id="view-tos">Vilkår</a>
      <a href="#" id="view-privacy">Personvern</a>
    </p>
  </div>

  <div class="login-footer">
    <p>Ny bruker? <button id="go-to-reg" class="link-btn">Opprett en foreldrekonto</button></p>
  </div>
</section>
