<main id="parent-insights" aria-label="Parent insights and mood history">
    <header>
        <button type="button" id="back-to-parent-menu" class="back-link" data-i18n="insights.back" aria-label="Back">Back</button>
        <h2 data-i18n="insights.title"></h2>
    </header>

    <div id="insights-loading" class="insight-state" role="status" aria-live="polite" data-i18n="insights.loading"></div>
    <div id="insights-empty" class="insight-state hidden" role="status" aria-live="polite" data-i18n="insights.empty"></div>
    <div id="insights-error" class="insight-state hidden" role="alert" aria-live="assertive" data-i18n="insights.error"></div>

    <div class="insight-cards">
        <article class="stat-card" role="region" aria-label="Mood statistics for last 7 days">
            <h3 data-i18n="insights.last7"></h3>
            <div id="mood-chart-placeholder">
                <p class="empty-msg hidden" data-i18n="insights.noChart"></p>
            </div>
        </article>

        <article class="history-card" role="region" aria-label="Mood history table">
            <h3 data-i18n="insights.history"></h3>
            <table id="mood-history-table" role="table" aria-label="Mood check-in history">
                <thead>
                <tr>
                    <th scope="col" data-i18n="insights.date"></th>
                    <th scope="col" data-i18n="insights.child"></th>
                    <th scope="col" data-i18n="insights.feeling"></th>
                    <th scope="col" data-i18n="insights.context"></th>
                </tr>
                </thead>
                <tbody id="history-list">
                </tbody>
            </table>
        </article>
    </div>

    <button type="button" id="export-data-btn" data-i18n="insights.export" aria-label="Export mood history data">Export Data</button>
</main>
