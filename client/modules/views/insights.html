<section id="parent-insights">
    <header>
        <button id="back-to-parent-menu" class="back-link" data-i18n="insights.back">⬅️ Tilbake</button>
        <h2 data-i18n="insights.title">Humørtrender og Innsikt</h2>
    </header>

    <div id="insights-loading" class="insight-state" data-i18n="insights.loading">Henter data…</div>
    <div id="insights-empty" class="insight-state hidden" data-i18n="insights.empty">Ingen innsikter å vise</div>
    <div id="insights-error" class="insight-state hidden" data-i18n="insights.error">Noe gikk galt ved henting av data</div>

    <div class="insight-cards">
        <article class="stat-card">
            <h3 data-i18n="insights.last7">Siste 7 dager</h3>
            <div id="mood-chart-placeholder">
                <p class="empty-msg hidden" data-i18n="insights.noChart">Ingen data for diagram</p>
            </div>
        </article>

        <article class="history-card">
            <h3 data-i18n="insights.history">Logghistorikk</h3>
            <table id="mood-history-table">
                <thead>
                <tr>
                    <th data-i18n="insights.date">Dato</th>
                    <th data-i18n="insights.child">Barn</th>
                    <th data-i18n="insights.feeling">Følelse</th>
                    <th data-i18n="insights.context">Kontekst</th>
                </tr>
                </thead>
                <tbody id="history-list">
                </tbody>
            </table>
        </article>
    </div>

    <button id="export-data-btn" data-i18n="insights.export">Last ned rapport (PDF/CSV)</button>
</section>
