<template id="child-item-template">
  <li>
    <div class="profile-header">
      <span class="child-name"></span>
      <div class="child-actions">
        <button class="select-child" data-i18n="profiles.select"></button>
        <button class="edit-child" data-i18n="profiles.edit"></button>
        <button class="delete-child" data-i18n="profiles.delete"></button>
      </div>
    </div>
    <div class="profile-pin-section">
      <p class="pin-message" data-i18n="profiles.pinMessage"></p>
      <div class="pin-status">
        <span class="pin-status-text"></span>
      </div>
      <div class="pin-button-group">
        <button class="create-pin-btn" data-i18n="profiles.createPin"></button>
        <button class="change-pin-btn" data-i18n="profiles.changePin" style="display: none;"></button>
        <button class="remove-pin-btn" data-i18n="profiles.removePin" style="display: none;"></button>
      </div>
      <div class="pin-input-section" style="display: none;">
        <label class="sr-only" data-i18n="profiles.pinLabel"></label>
        <input type="password" class="pin-input" placeholder="PIN (6 digits)" maxlength="6" inputmode="numeric" pattern="[0-9]*" required>
        <div class="pin-button-group">
          <button type="button" class="confirm-pin-btn" data-i18n="profiles.confirm"></button>
          <button type="button" class="cancel-pin-btn" data-i18n="profiles.cancel"></button>
        </div>
      </div>
    </div>
  </li>
</template>
