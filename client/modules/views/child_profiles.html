<section id="child-profiles">
  <div class="profiles-header">
    <button id="back-to-parent" class="back-link" data-i18n="profiles.back" aria-label="Back"></button>
    <h2 data-i18n="profiles.title"></h2>
  </div>

  <form id="create-child-form">
    <label for="childName-input" class="sr-only">Child name</label>
    <input type="text" id="childName-input" name="childName" placeholder="Child name" data-i18n-placeholder="profiles.childNamePlaceholder" required>
    <label for="age-select" class="sr-only">Child age</label>
    <select id="age-select" name="age" data-i18n-placeholder="profiles.childAgePlaceholder" required>
      <option value="">-- Select age --</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
      <option value="16">16</option>
      <option value="17">17</option>
      <option value="18">18</option>
    </select>
    <button type="submit" class="primary-btn" data-i18n="profiles.addChild">Add Child</button>
  </form>

  <ul id="child-list"></ul>
</section>

<template id="child-item-template">
  <li>
    <div class="profile-header">
      <div>
        <span class="child-name"></span>
        <span class="child-age" style="font-size: 0.9rem; color: var(--text-mid); margin-left: 0.5rem;"></span>
      </div>
      <div class="child-actions">
        <button class="select-child" data-i18n="profiles.select">Select</button>
        <button class="edit-child" data-i18n="profiles.edit">Edit</button>
        <button class="delete-child" data-i18n="profiles.delete">Delete</button>
      </div>
    </div>
    <div class="profile-pin-section">
      <p class="pin-message" data-i18n="profiles.pinMessage"></p>
      <div class="pin-status">
        <span class="pin-status-text"></span>
      </div>
      <div class="pin-button-group">
        <button class="create-pin-btn" data-i18n="profiles.createPin">Create PIN</button>
        <button class="change-pin-btn" data-i18n="profiles.changePin" style="display: none;">Change PIN</button>
        <button class="remove-pin-btn" data-i18n="profiles.removePin" style="display: none;">Remove PIN</button>
      </div>
      <div class="pin-input-section" style="display: none;">
        <label class="sr-only" data-i18n="profiles.pinLabel"></label>
        <input type="password" class="pin-input" placeholder="PIN (6 digits)" maxlength="6" inputmode="numeric" pattern="[0-9]*" required>
        <div class="pin-button-group">
          <button type="button" class="confirm-pin-btn" data-i18n="profiles.confirm">Confirm</button>
          <button type="button" class="cancel-pin-btn" data-i18n="profiles.cancel">Cancel</button>
        </div>
      </div>
    </div>
  </li>
</template>

<template id="child-edit-template">
  <div class="edit-inline">
    <label for="edit-name" class="sr-only">Child name</label>
    <input type="text" id="edit-name" class="edit-input" placeholder="Name" required>
    <label for="edit-age" class="sr-only">Child age</label>
    <select id="edit-age" class="edit-age">
      <option value="">-- Age --</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
      <option value="16">16</option>
      <option value="17">17</option>
      <option value="18">18</option>
    </select>
    <button type="button" class="save-edit" data-i18n="profiles.save">Save</button>
    <button type="button" class="cancel-edit" data-i18n="profiles.cancel">Cancel</button>
  </div>
</template>
