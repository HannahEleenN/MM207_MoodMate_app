<main id="child-profiles" aria-label="Child profile management">
  <div class="profiles-header">
    <button type="button" id="back-to-parent" class="back-link" data-i18n="profiles.back" aria-label="Back">Back</button>
    <h1 data-i18n="profiles.title"></h1>
  </div>

  <div class="profiles-container">
    <div class="profile-card">
      <form id="create-child-form" aria-label="Create child profile form">
        <fieldset class="form-fieldset">
          <legend class="form-section-legend" data-i18n="profiles.createNewChild"></legend>

          <div id="form-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

          <div class="input-group">
            <label for="childName-input">
              <span data-i18n="profiles.childNamePlaceholder"></span>
              <span class="required-indicator" aria-label="required">*</span>
              <span class="field-requirement" data-i18n="profiles.required"></span>
            </label>
            <input type="text" id="childName-input" name="childName" placeholder="Child name" data-i18n-placeholder="profiles.childNamePlaceholder" required
                   aria-describedby="childName-error childName-hint"
                   aria-required="true">
            <span id="childName-hint" class="helper-text" data-i18n="profiles.nameHelp"></span>
            <span id="childName-error" class="field-error" role="alert"></span>
          </div>

          <div class="input-group">
            <label for="age-select">
              <span data-i18n="profiles.childAgePlaceholder"></span>
              <span class="optional-indicator" data-i18n="profiles.optional"></span>
            </label>
            <select id="age-select" name="age" data-i18n-placeholder="profiles.childAgePlaceholder"
                    aria-describedby="age-error age-hint"
                    aria-required="false">
              <option value="">-- Select age --</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>
            </select>
            <span id="age-hint" class="helper-text" data-i18n="profiles.ageHelp"></span>
            <span id="age-error" class="field-error" role="alert"></span>
          </div>

          <div class="pin-creation-section">
            <div class="pin-section-header">
              <h3 data-i18n="profiles.pinLabel"></h3>
              <span class="optional-indicator" data-i18n="profiles.optional"></span>
            </div>
            <p class="pin-section-info" data-i18n="profiles.pinCreationHelp"></p>

            <div class="input-group">
              <label for="pin-input">
                <span data-i18n="profiles.pinLabel"></span>
              </label>
              <input type="password" id="pin-input" name="pin" placeholder="6-digit PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*"
                     aria-describedby="pin-error pin-hint"
                     aria-required="false">
              <span id="pin-hint" class="helper-text">Enter 6 digits (0-9)</span>
              <span id="pin-error" class="field-error" role="alert"></span>
            </div>
          </div>

          <div class="form-submit-group">
            <button type="submit" class="primary-btn" data-i18n="profiles.addChild" aria-label="Add child profile">Add Child</button>
          </div>
        </fieldset>
      </form>
    </div>
  </div>

  <ul id="child-list" role="list"></ul>
</main>

<template id="child-item-template">
  <li role="listitem">
    <div class="profile-header">
      <div class="child-info">
        <span class="child-name"></span>
        <span class="child-age"></span>
      </div>
      <div class="child-actions">
        <button type="button" class="select-child" data-i18n="profiles.select" aria-label="Select this child">Select</button>
        <button type="button" class="edit-child" data-i18n="profiles.edit" aria-label="Edit this child profile">Edit</button>
        <button type="button" class="delete-child" data-i18n="profiles.delete" aria-label="Delete this child profile">Delete</button>
      </div>
    </div>
    <div class="profile-pin-section" role="region" aria-label="PIN settings for this child">
      <p class="pin-message" data-i18n="profiles.pinMessage"></p>
      <div class="pin-status" role="status" aria-live="polite">
        <span class="pin-status-text"></span>
      </div>
      <div class="pin-button-group">
        <button type="button" class="create-pin-btn" data-i18n="profiles.createPin" aria-label="Create a PIN for this child">Create PIN</button>
        <button type="button" class="change-pin-btn hidden-element" data-i18n="profiles.changePin" aria-label="Change PIN for this child">Change PIN</button>
        <button type="button" class="remove-pin-btn hidden-element" data-i18n="profiles.removePin" aria-label="Remove PIN from this child">Remove PIN</button>
      </div>
      <div class="pin-input-section hidden-element">
        <fieldset class="form-fieldset">
          <legend class="sr-only" data-i18n="profiles.pinLabel"></legend>
          <div class="input-group">
            <label for="pin-input-field" class="sr-only">
              <span data-i18n="profiles.pinLabel"></span>
              <span class="required-indicator" aria-label="required">*</span>
            </label>
            <input type="password" class="pin-input" id="pin-input-field" placeholder="PIN (6 digits)" maxlength="6" inputmode="numeric" pattern="[0-9]*" required
                   aria-describedby="pin-input-error pin-input-helper"
                   aria-required="true">
            <span id="pin-input-error" class="field-error" role="alert"></span>
            <span id="pin-input-helper" class="helper-text">Enter a 6-digit numeric PIN</span>
          </div>
          <div class="pin-button-group">
            <button type="button" class="confirm-pin-btn" data-i18n="profiles.confirm" aria-label="Confirm PIN">Confirm</button>
            <button type="button" class="cancel-pin-btn" data-i18n="profiles.cancel" aria-label="Cancel PIN entry">Cancel</button>
          </div>
        </fieldset>
      </div>
    </div>
  </li>
</template>

<template id="child-edit-template">
  <div class="edit-inline" role="region" aria-label="Edit child profile inline form">
    <label for="edit-name" class="sr-only">Child name</label>
    <input type="text" id="edit-name" class="edit-input" placeholder="Name" required aria-label="Edit child name">
    <label for="edit-age" class="sr-only">Child age</label>
    <select id="edit-age" class="edit-age" aria-label="Edit child age">
      <option value="">-- Age --</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
      <option value="13">13</option>
      <option value="14">14</option>
      <option value="15">15</option>
      <option value="16">16</option>
      <option value="17">17</option>
      <option value="18">18</option>
    </select>
    <button type="button" class="save-edit" data-i18n="profiles.save" aria-label="Save profile changes">Save</button>
    <button type="button" class="cancel-edit" data-i18n="profiles.cancel" aria-label="Cancel editing">Cancel</button>
  </div>
</template>
