<section id="mood-checkin-flow">
    <div class="progress-container">
        <div class="progress-bar" id="checkin-progress" style="width: 33%"></div>
    </div>

    <div id="step-1-mood">
there         <h2 data-i18n="child.hello">Hei på deg! 🌟</h2>
        <p data-i18n="child.askMood">Hvordan føler du deg akkurat nå?</p>
        <div class="mood-grid">
            <button class="mood-btn" data-mood="glad" data-i18n="mood.happy">😊 Glad</button>
            <button class="mood-btn" data-mood="lei" data-i18n="mood.sad">😢 Lei meg</button>
            <button class="mood-btn" data-mood="sint" data-i18n="mood.angry">😡 Sint</button>
            <button class="mood-btn" data-mood="redd" data-i18n="mood.scared">😨 Redd</button>
            <button class="mood-btn" data-mood="rolig" data-i18n="mood.calm">😌 Rolig</button>
            <button class="mood-btn" data-mood="overrasket" data-i18n="mood.surprised">😲 Overrasket</button>
        </div>
    </div>

    <div id="step-2-reason" style="display: none;">
        <h2 data-i18n="checkin.reasonTitle">Hva gjør deg <span id="selected-mood-text">...</span>?</h2>
        <p data-i18n="checkin.instructions">Se på bildene eller bruk ord:</p>
        <div class="mood-grid">
            <button class="context-btn" data-context="morket" data-i18n="context.dark">🌑 Mørket</button>
            <button class="context-btn" data-context="venner" data-i18n="context.friends">👭 Venner</button>
            <button class="context-btn" data-context="skole" data-i18n="context.school">🏫 Skole</button>
            <button class="context-btn" data-context="familie" data-i18n="context.family">🏠 Familie</button>
        </div>
        <textarea id="mood-context-text" data-i18n-placeholder="checkin.contextPlaceholder" placeholder="Skriv eller fortell mer her..."></textarea>
        <button id="btn-next-step" class="primary-btn" data-i18n="checkin.next">Gå videre ➡️</button>
    </div>

    <div id="step-3-solution" style="display: none;">
        <h2 data-i18n="child.nextActionTitle">Hva vil du gjøre nå?</h2>
        <div class="mood-grid">
            <button class="sol-btn" data-sol="klem" data-i18n="solution.hug"> 🤗 Få en klem </button>
            <button class="sol-btn" data-sol="snakke" data-i18n="solution.talk"> 💬 Snakke med en voksen </button>
            <button class="sol-btn" data-sol="tegne" data-i18n="solution.draw"> 🎨 Tegne </button>
            <button class="sol-btn" data-sol="musikk" data-i18n="solution.music"> 🎵 Høre på musikk </button>
            <button class="sol-btn" data-sol="leke" data-i18n="solution.play"> 🧸 Leke litt </button>
            <button class="sol-btn" data-sol="fin-tanke" data-i18n="solution.positive"> 🌈 Tenke på noe fint </button>
        </div>
        <button id="btn-finish" class="save-btn" data-i18n="checkin.finish">Ferdig! ✨</button>
    </div>
</section>
