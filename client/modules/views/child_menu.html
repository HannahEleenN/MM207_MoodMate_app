<main id="child-menu" class="flex-column stack-m" aria-label="Child mood tracking wizard">

  <div class="progress-container">
    <progress id="mood-progress" value="33" max="100" aria-label="Progress through mood tracking"></progress>
  </div>

  <div id="step-1" class="step-container stack-m align-center" role="region" aria-label="Step 1: Select mood">
    <h2 data-i18n="child.hello"></h2>
    <p data-i18n="child.askMood"></p>

    <div class="mood-options" role="radiogroup" aria-label="Mood options">
      <button type="button" class="mood-btn" data-mood="happy"       data-i18n="mood.happy" aria-label="Happy">Happy</button>
      <button type="button" class="mood-btn" data-mood="sad"        data-i18n="mood.sad" aria-label="Sad">Sad</button>
      <button type="button" class="mood-btn" data-mood="angry"       data-i18n="mood.angry" aria-label="Angry">Angry</button>
      <button type="button" class="mood-btn" data-mood="scared"       data-i18n="mood.scared" aria-label="Scared">Scared</button>
      <button type="button" class="mood-btn" data-mood="calm"      data-i18n="mood.calm" aria-label="Calm">Calm</button>
      <button type="button" class="mood-btn" data-mood="surprised" data-i18n="mood.surprised" aria-label="Surprised">Surprised</button>
    </div>
  </div>

  <div id="step-2" class="step-container stack-m align-center" role="region" aria-label="Step 2: Select context" hidden>
    <h2 data-i18n="child.whyTitle"><span id="display-mood" class="display-mood">…</span>?</h2>

    <div class="context-options" role="group" aria-label="Context options">
      <button type="button" class="context-btn" data-context="school"   data-i18n="context.school" aria-label="School">School</button>
      <button type="button" class="context-btn" data-context="friends"  data-i18n="context.friends" aria-label="Friends">Friends</button>
      <button type="button" class="context-btn" data-context="home"  data-i18n="context.home" aria-label="Home">Home</button>
    </div>
  </div>

  <div id="step-3" class="step-container stack-m align-center" role="region" aria-label="Step 3: Choose action" hidden>
    <h2 data-i18n="child.nextActionTitle"></h2>

    <div class="solution-options" id="step-3-solutions" role="group" aria-label="Suggested actions">
      <!-- Populated by JavaScript -->
    </div>


    <button type="button" id="save-mood-btn" class="primary-btn" data-i18n="child.finish" aria-label="Finish">Finish</button>
  </div>

</main>
