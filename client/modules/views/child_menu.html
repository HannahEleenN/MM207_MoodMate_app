<section id="child-menu">

  <div class="progress-container">
    <progress id="mood-progress" value="33" max="100"></progress>
  </div>

  <div id="step-1" class="step-container">
    <h2 data-i18n="child.hello"></h2>
    <p data-i18n="child.askMood"></p>

    <div class="mood-options" role="radiogroup" aria-label="Mood options">
      <button type="button" class="mood-btn" data-mood="happy"       data-i18n="mood.happy">Happy</button>
      <button type="button" class="mood-btn" data-mood="sad"        data-i18n="mood.sad">Sad</button>
      <button type="button" class="mood-btn" data-mood="angry"       data-i18n="mood.angry">Angry</button>
      <button type="button" class="mood-btn" data-mood="scared"       data-i18n="mood.scared">Scared</button>
      <button type="button" class="mood-btn" data-mood="calm"      data-i18n="mood.calm">Calm</button>
      <button type="button" class="mood-btn" data-mood="surprised" data-i18n="mood.surprised">Surprised</button>
    </div>
  </div>

  <div id="step-2" class="step-container" hidden>
    <h2 data-i18n="child.whyTitle"><span id="display-mood" style="color:teal">…</span>?</h2>

    <div class="context-options">
      <button type="button" class="context-btn" data-context="school"   data-i18n="context.school" aria-label="School">School</button>
      <button type="button" class="context-btn" data-context="friends"  data-i18n="context.friends" aria-label="Friends">Friends</button>
      <button type="button" class="context-btn" data-context="home"  data-i18n="context.home" aria-label="Home">Home</button>
    </div>
  </div>

  <div id="step-3" class="step-container" hidden>
    <h2 data-i18n="child.nextActionTitle"></h2>

    <div class="solution-options">
      <button type="button" class="solution-btn" data-solution="hug"    data-i18n="solution.hug" aria-label="Hug">Hug</button>
      <button type="button" class="solution-btn" data-solution="talk"  data-i18n="solution.talk" aria-label="Talk">Talk</button>
    </div>

    <button type="button" id="save-mood-btn" class="primary-btn" data-i18n="child.finish" aria-label="Finish">Finish</button>
  </div>

</section>
