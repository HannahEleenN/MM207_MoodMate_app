<section class="child-profiles">
  <h2 data-i18n="profiles.title"></h2>
  <p data-i18n="profiles.description"></p>

  <form id="create-child-form">
    <label for="child-name-input" class="sr-only" data-i18n="profiles.nicknamePlaceholder"></label>
    <input id="child-name-input" type="text" name="name" data-i18n-placeholder="profiles.nicknamePlaceholder" placeholder="" required>
    <label for="child-age-input" class="sr-only" data-i18n="profiles.agePlaceholder"></label>
    <input id="child-age-input" type="number" name="age" data-i18n-placeholder="profiles.agePlaceholder" placeholder="">
    <button type="submit" class="primary-btn" data-i18n="profiles.create"></button>
  </form>

  <hr>

  <h3 data-i18n="profiles.existing"></h3>
  <ul id="child-list"></ul>

  <template id="child-item-template">
    <li>
      <span class="child-name"></span>
      <div class="child-actions">
        <button class="select-child" data-i18n="profiles.select"></button>
        <button class="edit-child" data-i18n="profiles.edit"></button>
        <button class="delete-child" data-i18n="profiles.delete"></button>
      </div>
    </li>
  </template>

  <template id="child-edit-template">
    <div class="edit-inline">
      <input type="text" class="edit-input" aria-label="" data-i18n-placeholder="profiles.newNamePlaceholder" placeholder="">
      <button class="save-edit" data-i18n="profiles.save"></button>
      <button class="cancel-edit" data-i18n="profiles.cancel"></button>
    </div>
  </template>
</section>
