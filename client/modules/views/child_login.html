<main id="child-login-container" aria-label="Child PIN login">
  <div class="brand">
    <h1 data-i18n="app.title"></h1>
    <p data-i18n="child.loginPrompt"></p>
  </div>

  <form id="childLoginForm" aria-label="Child PIN login form">
    <fieldset class="form-fieldset">
      <legend class="form-section-legend" data-i18n="child.pinLabel"></legend>

      <div id="form-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

      <div class="input-group">
        <label for="child-pin-input">
          <span data-i18n="child.pinLabel"></span>
          <span class="required-indicator" aria-label="required">*</span>
        </label>
        <input type="password" id="child-pin-input" required data-i18n-placeholder="child.pinPlaceholder" placeholder="" maxlength="6" inputmode="numeric" autocomplete="one-time-code"
               aria-describedby="pin-error"
               aria-required="true">
        <span id="pin-error" class="field-error" role="alert"></span>
      </div>

      <div class="form-submit-group">
        <button type="submit" class="primary-btn" data-i18n="child.continue" aria-label="Continue">Continue</button>
      </div>
    </fieldset>
  </form>

  <div class="login-footer">
    <p><button type="button" id="back-to-parent" class="link-btn" data-i18n="child.backToParent" aria-label="Back to parent login">Back to Parent Login</button></p>
  </div>
</main>
