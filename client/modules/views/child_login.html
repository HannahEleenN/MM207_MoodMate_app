<section id="child-login-container">
  <div class="brand">
    <h1 data-i18n="app.title"></h1>
    <p data-i18n="child.loginPrompt"></p>
  </div>

  <form id="childLoginForm">
    <div class="input-group">
      <label for="child-pin-input" data-i18n="child.pinLabel"></label>
      <input type="password" id="child-pin-input" required data-i18n-placeholder="child.pinPlaceholder" placeholder="" maxlength="6">
    </div>
    <button type="submit" class="primary-btn" data-i18n="child.continue"></button>
  </form>

  <div class="login-footer">
    <p><button id="back-to-parent" class="link-btn" data-i18n="child.backToParent"></button></p>
  </div>
</section>
